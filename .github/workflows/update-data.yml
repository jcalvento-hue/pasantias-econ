name: Actualizar datos de pasantias

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests lxml openpyxl xlrd

      - name: Run update script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "Actualizar datos desde Excel $(date '+%Y-%m-%d')" && git push)
